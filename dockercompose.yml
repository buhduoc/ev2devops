version: '3.8'

services:
  backend:
  
  database:
  image: buhdockerhub:evaluacion2:latest
  environment:
    MYSQL_ROOT_PASSWORD: rootpassword
    MYSQL_DATABASE: rentcar_db
    MYSQL_USER: rentcar_user
    MYSQL_PASSWORD: rentcar_pass
